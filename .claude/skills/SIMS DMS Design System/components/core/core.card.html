<!-- @dsCard group="Components" viewport="700x420" name="Core — Buttons, Badges, Stats" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px; font-family: var(--font-sans); }
  .sec { margin-bottom: 20px; }
  .lab { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin: 0 0 10px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Badge, StatCard, Avatar } = window.SIMSDMSDesignSystem_019e12;
  function Demo() {
    return (
      <div>
        <div className="sec">
          <p className="lab">Buttons — variants</p>
          <div className="row">
            <Button variant="primary">Send OTP →</Button>
            <Button variant="secondary" icon={<span>📋</span>}>Check In</Button>
            <Button variant="outline" size="sm">View →</Button>
            <Button variant="success">Approve</Button>
            <Button variant="danger">Reject</Button>
            <Button variant="ghost">Cancel</Button>
            <Button variant="primary" loading>Sending…</Button>
          </div>
        </div>
        <div className="sec">
          <p className="lab">Badges — status & role</p>
          <div className="row">
            <Badge status="active" />
            <Badge status="checked_in" />
            <Badge status="late" />
            <Badge status="absent" />
            <Badge status="cover_pending" />
            <Badge status="pending_telegram" />
            <Badge status="faculty" />
            <Badge status="admin" />
            <Badge status="super_admin" />
          </div>
        </div>
        <div className="sec">
          <p className="lab">Stat cards + avatars</p>
          <div className="grid3">
            <StatCard label="Active Faculty" value={24} accent="blue" icon="👥" />
            <StatCard label="Pending" value={3} accent="yellow" sub="Needs action" icon="⏳" />
            <StatCard label="Flagged" value={1} accent="red" sub="Awaiting review" icon="⚑" />
          </div>
          <div className="row" style={{ marginTop: 12 }}>
            <Avatar name="Priya Sharma" size="sm" />
            <Avatar name="Joseph K" />
            <Avatar name="Admin User" size="lg" />
            <Avatar name="On Dark" onDark />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
