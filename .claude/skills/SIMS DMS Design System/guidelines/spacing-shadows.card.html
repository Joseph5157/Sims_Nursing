<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows & elevation" subtitle="Soft, low-spread — card, dropdown, modal, sheet, brand glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px; font-family: var(--font-sans); }
  .row { display: flex; gap: 22px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
  .card { width: 100%; height: 56px; background: #fff; border-radius: 14px; }
  .v { font-size: 11px; font-weight: 700; color: var(--text-primary); }
  .t { font-size: 9px; color: var(--text-muted); font-family: var(--font-mono); }
  .glow { background: var(--brand-gradient); }
</style>
</head>
<body>
  <div class="row">
    <div class="step"><div class="card" style="box-shadow:var(--shadow-card)"></div><span class="v">card</span></div>
    <div class="step"><div class="card" style="box-shadow:var(--shadow-dropdown)"></div><span class="v">dropdown</span></div>
    <div class="step"><div class="card" style="box-shadow:var(--shadow-modal)"></div><span class="v">modal</span></div>
    <div class="step"><div class="card" style="box-shadow:var(--shadow-sheet)"></div><span class="v">sheet</span></div>
    <div class="step"><div class="card glow" style="box-shadow:var(--shadow-brand)"></div><span class="v">brand glow</span></div>
  </div>
</body>
</html>
