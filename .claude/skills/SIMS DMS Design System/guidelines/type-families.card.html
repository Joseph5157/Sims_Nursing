<!-- @dsCard group="Type" viewport="700x180" name="Font families" subtitle="DM Sans for UI, DM Mono for codes & numerals" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 22px 26px; }
  .row { display: flex; gap: 32px; align-items: flex-end; flex-wrap: wrap; }
  .spec { display: flex; flex-direction: column; gap: 4px; }
  .glyphs { font-size: 44px; line-height: 1; color: var(--text-primary); letter-spacing: -0.02em; }
  .mono .glyphs { font-family: var(--font-mono); }
  .name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .meta { font-size: 11px; color: var(--text-muted); }
  .weights { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="spec">
      <div class="glyphs" style="font-family: var(--font-sans);">Aa Bb Cc 123</div>
      <div class="name">DM Sans</div>
      <div class="meta">Primary typeface · all UI &amp; content</div>
      <div class="weights" style="font-family: var(--font-sans);">
        <span style="font-weight:400">Regular</span> ·
        <span style="font-weight:500">Medium</span> ·
        <span style="font-weight:600">Semibold</span> ·
        <span style="font-weight:700">Bold</span> ·
        <span style="font-weight:800">Extra</span>
      </div>
    </div>
    <div class="spec mono">
      <div class="glyphs">0 1 2 9 :</div>
      <div class="name">DM Mono</div>
      <div class="meta">Codes · OTP · IDs · timers</div>
      <div class="weights" style="font-family: var(--font-mono);">Regular · Medium</div>
    </div>
  </div>
</body>
</html>
