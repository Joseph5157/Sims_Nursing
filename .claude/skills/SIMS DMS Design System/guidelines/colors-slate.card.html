<!-- @dsCard group="Colors" viewport="700x150" name="Slate neutrals" subtitle="Backbone — text, borders, dark sidebar #0f172a" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px 26px; font-family: var(--font-sans); }
  .swatches { display: flex; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  .sw { flex: 1; height: 64px; }
  .row { display: flex; }
  .cell { flex: 1; padding: 8px 2px 0; display: flex; flex-direction: column; gap: 1px; }
  .n { font-size: 10px; font-weight: 700; color: var(--text-secondary); }
  .h { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw" style="background:var(--slate-50)"></div>
    <div class="sw" style="background:var(--slate-100)"></div>
    <div class="sw" style="background:var(--slate-200)"></div>
    <div class="sw" style="background:var(--slate-300)"></div>
    <div class="sw" style="background:var(--slate-400)"></div>
    <div class="sw" style="background:var(--slate-500)"></div>
    <div class="sw" style="background:var(--slate-700)"></div>
    <div class="sw" style="background:var(--slate-900)"></div>
  </div>
  <div class="row">
    <div class="cell"><span class="n">50</span><span class="h">f8fafc</span></div>
    <div class="cell"><span class="n">100</span><span class="h">f1f5f9</span></div>
    <div class="cell"><span class="n">200</span><span class="h">e2e8f0</span></div>
    <div class="cell"><span class="n">300</span><span class="h">cbd5e1</span></div>
    <div class="cell"><span class="n">400</span><span class="h">94a3b8</span></div>
    <div class="cell"><span class="n">500</span><span class="h">64748b</span></div>
    <div class="cell"><span class="n">700</span><span class="h">334155</span></div>
    <div class="cell"><span class="n">900</span><span class="h">0f172a</span></div>
  </div>
</body>
</html>
