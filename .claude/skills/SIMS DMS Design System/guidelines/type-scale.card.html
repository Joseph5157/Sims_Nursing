<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="Role-based scale — dense, mobile-first (RULE 8)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px 26px; font-family: var(--font-sans); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--divider); }
  .line:last-child { border-bottom: none; }
  .sample { color: var(--text-primary); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); width: 130px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="line"><span class="tag">stat · 40 / 800</span><span class="sample" style="font-size:40px;font-weight:800;letter-spacing:-0.02em;line-height:1;">128</span></div>
  <div class="line"><span class="tag">display · 28 / 800</span><span class="sample" style="font-size:28px;font-weight:800;">Discipline Management</span></div>
  <div class="line"><span class="tag">h2 · 22 / 800</span><span class="sample" style="font-size:22px;font-weight:800;">Sign in</span></div>
  <div class="line"><span class="tag">page title · 18 / 700</span><span class="sample" style="font-size:18px;font-weight:700;">Welcome, Priya</span></div>
  <div class="line"><span class="tag">body · 14 / 400</span><span class="sample" style="font-size:14px;font-weight:400;">Faculty duty scheduling and violation tracking.</span></div>
  <div class="line"><span class="tag">small · 12 / 400</span><span class="sample" style="font-size:12px;font-weight:400;color:var(--text-secondary);">Check your upcoming slots below</span></div>
  <div class="line"><span class="tag">micro · 11 / 600 caps</span><span class="sample" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);">Quick actions</span></div>
</body>
</html>
