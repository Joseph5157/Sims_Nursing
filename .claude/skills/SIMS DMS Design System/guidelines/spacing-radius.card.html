<!-- @dsCard group="Spacing" viewport="700x160" name="Radius" subtitle="12 default · 14 cards · 16 mobile · 28 sheets · full pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 22px 26px; font-family: var(--font-sans); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .sq { width: 58px; height: 58px; background: var(--blue-50); border: 1.5px solid var(--blue-400); border-bottom: none; border-right: none; }
  .v { font-size: 11px; font-weight: 700; color: var(--text-primary); font-family: var(--font-mono); }
  .t { font-size: 9px; color: var(--text-muted); }
  .pill { width: 58px; height: 30px; background: var(--blue-600); border-radius: 9999px; }
</style>
</head>
<body>
  <div class="row">
    <div class="step"><div class="sq" style="border-top-left-radius:6px"></div><span class="v">6</span><span class="t">sm</span></div>
    <div class="step"><div class="sq" style="border-top-left-radius:8px"></div><span class="v">8</span><span class="t">md · nav</span></div>
    <div class="step"><div class="sq" style="border-top-left-radius:12px"></div><span class="v">12</span><span class="t">lg · btn</span></div>
    <div class="step"><div class="sq" style="border-top-left-radius:14px"></div><span class="v">14</span><span class="t">xl · card</span></div>
    <div class="step"><div class="sq" style="border-top-left-radius:16px"></div><span class="v">16</span><span class="t">2xl</span></div>
    <div class="step"><div class="sq" style="border-top-left-radius:20px"></div><span class="v">20</span><span class="t">3xl · mark</span></div>
    <div class="step"><div class="sq" style="border-top-left-radius:28px"></div><span class="v">28</span><span class="t">sheet</span></div>
    <div class="step"><div class="pill"></div><span class="v">full</span><span class="t">pill</span></div>
  </div>
</body>
</html>
