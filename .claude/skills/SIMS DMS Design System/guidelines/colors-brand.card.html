<!-- @dsCard group="Colors" viewport="700x150" name="Brand blue" subtitle="The action spine — #2563eb primary, #1d4ed8 hover" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 20px 26px; font-family: var(--font-sans); }
  .swatches { display: flex; gap: 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  .sw { flex: 1; height: 64px; display: flex; align-items: flex-end; padding: 6px; }
  .label { display: flex; flex-direction: column; gap: 1px; padding: 8px 2px 0; }
  .row { display: flex; gap: 0; }
  .cell { flex: 1; }
  .n { font-size: 10px; font-weight: 700; color: var(--text-secondary); }
  .h { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
  .on { color: #fff; font-size: 9px; font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw" style="background:var(--blue-50)"></div>
    <div class="sw" style="background:var(--blue-100)"></div>
    <div class="sw" style="background:var(--blue-200)"></div>
    <div class="sw" style="background:var(--blue-400)"></div>
    <div class="sw" style="background:var(--blue-500)"><span class="on">500</span></div>
    <div class="sw" style="background:var(--blue-600)"><span class="on">600</span></div>
    <div class="sw" style="background:var(--blue-700)"><span class="on">700</span></div>
    <div class="sw" style="background:var(--blue-800)"><span class="on">800</span></div>
  </div>
  <div class="row">
    <div class="cell label"><span class="n">50</span><span class="h">#eff6ff</span></div>
    <div class="cell label"><span class="n">100</span><span class="h">#dbeafe</span></div>
    <div class="cell label"><span class="n">200</span><span class="h">#bfdbfe</span></div>
    <div class="cell label"><span class="n">400</span><span class="h">#60a5fa</span></div>
    <div class="cell label"><span class="n">500</span><span class="h">#3b82f6</span></div>
    <div class="cell label"><span class="n">600 ●</span><span class="h">#2563eb</span></div>
    <div class="cell label"><span class="n">700</span><span class="h">#1d4ed8</span></div>
    <div class="cell label"><span class="n">800</span><span class="h">#1e40af</span></div>
  </div>
</body>
</html>
